<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARP — MIDI Arpeggiator</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --panel: #111116;
  --border: #1e1e28;
  --accent: #c8ff00;
  --accent2: #ff6b35;
  --muted: #3a3a48;
  --text: #e8e8f0;
  --text-dim: #6a6a80;
  --beat: #2a2a38;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 10px 40px;
}

#app {
  width: 100%;
  max-width: 460px;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
}

.header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.midi-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.midi-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.2s;
}

.midi-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
}

.panel-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-bottom: 10px;
}

.midi-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.midi-row select {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--mono);
  outline: none;
  cursor: pointer;
}

.midi-row select:focus { border-color: var(--accent); }

.btn {
  background: var(--bg);
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  user-select: none;
}

.btn:hover { border-color: var(--muted); color: var(--text); }

.btn.on {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 700;
}

.btn.on2 {
  background: var(--accent2);
  color: #000;
  border-color: var(--accent2);
  font-weight: 700;
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  margin-bottom: 10px;
}

.mode-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-align: center;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}

.mode-btn:hover { border-color: var(--muted); color: var(--text); }

.mode-btn.on {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 700;
}

.tempo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.bpm-display {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  min-width: 70px;
}

.bpm-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.bpm-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.bpm-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 0 8px var(--accent);
}

.sig-row {
  display: flex;
  gap: 5px;
  margin-top: 14px;
}

.sig-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-family: var(--mono);
  cursor: pointer;
  transition: all 0.1s;
  user-select: none;
}

.sig-btn.on { background: var(--beat); color: var(--text); border-color: var(--muted); }

.seq-grid {
  display: flex;
  gap: 2px;
  height: 20px;
  align-items: stretch;
}

.seq-cell {
  flex: 1;
  border-radius: 2px;
  background: var(--bg);
  border: 1px solid var(--border);
  transition: background 0.05s;
}

.seq-cell.beat-start { border-color: var(--muted); }

.seq-cell.active {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 4px var(--accent);
}

.spin-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: space-between;
}

.spin-group {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.spin-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--mono);
  padding: 0 8px;
  background: var(--bg);
  height: 28px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
}

.spin-btn {
  background: var(--bg);
  color: var(--text-dim);
  border: none;
  width: 26px;
  height: 28px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}

.spin-btn:hover { background: var(--beat); color: var(--text); }

.spin-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  min-width: 24px;
  text-align: center;
  background: var(--bg);
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 2px;
}

.notes-area {
  min-height: 30px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: center;
}

.note-chip {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 4px;
  background: var(--beat);
  color: var(--text);
  border: 1px solid var(--muted);
  animation: pop 0.1s ease;
}

.note-chip.arp {
  background: color-mix(in srgb, var(--accent) 15%, var(--bg));
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  color: var(--accent);
}

@keyframes pop {
  from { transform: scale(0.85); opacity: 0.5; }
  to { transform: scale(1); opacity: 1; }
}

.quant-info {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-top: 6px;
}

.quant-info span { color: var(--accent2); }

.toggle-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  justify-content: space-between;
}

.sep {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}

.chord-badge {
  font-size: 9px;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-left: 4px;
}

/* Division slider */
.div-slider-wrap { margin-top: 4px; }

.div-ticks {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  padding: 0 2px;
}

.div-tick {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  gap: 3px;
  flex: 1;
}

.div-tick-line {
  width: 1px;
  height: 8px;
  background: var(--muted);
  transition: all 0.1s;
}

.div-tick.active .div-tick-line {
  background: var(--accent);
  width: 2px;
  height: 12px;
}

.div-tick.triplet .div-tick-line { background: var(--accent2); opacity: 0.5; }
.div-tick.triplet.active .div-tick-line { background: var(--accent2); opacity: 1; }
.div-tick.dotted .div-tick-line { background: #88aaff; opacity: 0.5; }
.div-tick.dotted.active .div-tick-line { background: #88aaff; opacity: 1; }

.div-tick-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-dim);
  transition: color 0.1s;
}

.div-tick.active .div-tick-label { color: var(--accent); }
.div-tick.triplet .div-tick-label { color: var(--accent2); opacity: 0.6; }
.div-tick.triplet.active .div-tick-label { opacity: 1; }
.div-tick.dotted .div-tick-label { color: #88aaff; opacity: 0.6; }
.div-tick.dotted.active .div-tick-label { opacity: 1; }

.div-track {
  position: relative;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  margin: 0 2px;
}

.div-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  pointer-events: none;
}

/* Hold block */
.hold-block {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.hold-block.active { border-color: var(--accent); }

.hold-main-btn {
  background: var(--bg);
  color: var(--text-dim);
  border: none;
  border-right: 1px solid var(--border);
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
}

.hold-main-btn.active {
  background: var(--accent);
  color: #000;
  border-right-color: var(--accent);
}

.hold-mode-btns {
  display: flex;
  flex-direction: column;
  flex: 1;
  opacity: 0.35;
  transition: opacity 0.15s;
}

.hold-mode-btns.enabled { opacity: 1; }

.hold-mode-btn {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  cursor: pointer;
  padding: 0 12px;
  text-align: left;
  transition: all 0.1s;
}

.hold-mode-btn:last-child { border-bottom: none; }

.hold-mode-btn.active {
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, transparent);
}

.hold-mode-btn:hover { color: var(--text); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.running-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse var(--pulse-dur, 1s) steps(1, end) infinite;
  margin-right: 5px;
  vertical-align: middle;
}

.stopped-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  margin-right: 5px;
  vertical-align: middle;
}
</style>
</head>
<body>

<div id="app">

  <div class="header">
    <div class="subtitle">WEBMIDI Arpeggiator</div>
    <div class="midi-status">
      <div class="midi-dot" :class="{on: midi.access}"></div>
      MIDI
    </div>
  </div>

  <div class="midi-row">
    <button class="btn" @click="initMIDI">Init</button>
    <select v-model="midi.inId">
      <option v-for="i in inputs" :value="i.id">↓ {{i.name}}</option>
      <option v-if="!inputs.length" :value="null">— no input —</option>
    </select>
    <select v-model="midi.outId">
      <option v-for="o in outputs" :value="o.id">↑ {{o.name}}</option>
      <option v-if="!outputs.length" :value="null">— no output —</option>
    </select>
  </div>

  <div class="toggle-row">
    <button class="btn" :class="{on: arpOn}" @click="arpOn=!arpOn">
      {{ arpOn ? 'ARP ON' : 'ARP OFF' }}
    </button>
    <button class="btn" :class="{on: soundOn}" @click="soundOn=!soundOn">♪ SOUND</button>
  </div>

  <!-- Clock / Tempo -->
  <div class="panel">
    <div class="panel-label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span>
        <span v-if="scheduler.running"><span class="running-dot" :style="{'--pulse-dur': pulseDuration}"></span>Running</span>
        <span v-else><span class="stopped-dot"></span>Stopped</span>
      </span>
      <span style="display:flex;gap:5px;align-items:center">
        <button class="btn" :class="{on: freeClock}" @click="toggleFreeClock">FREE</button>
        <button class="btn" :class="{on: midiSync}" @click="toggleMidiSync">
          SYNC<span v-if="midiSync && midiBpm"> {{midiBpm}}</span>
        </button>
        <select v-if="midiSync" v-model.number="midiPpqn" style="background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 6px;border-radius:5px;font-size:10px;font-family:var(--mono)">
          <option :value="1">1 PPQ</option>
          <option :value="2">2 PPQ</option>
          <option :value="4">4 PPQ</option>
          <option :value="8">8 PPQ</option>
          <option :value="24">24 PPQ</option>
          <option :value="48">48 PPQ</option>
        </select>
      </span>
    </div>

    <div class="tempo-row">
      <div>
        <div class="bpm-display">{{arp.bpm}}</div>
        <div class="bpm-sub">BPM</div>
      </div>
      <input type="range" class="bpm-slider" min="40" max="240" v-model.number="arp.bpm"/>
    </div>

    <div class="seq-grid">
      <div v-for="i in displaySteps" :key="i"
           :class="{
             'seq-cell': true,
             'active': (i-1) === (arp.stepIndex % displaySteps),
             'beat-start': (i-1) % stepsPerBeatDisplay === 0
           }">
      </div>
    </div>

    <div class="sig-row">
      <button v-for="s in signatures" class="sig-btn"
              :class="{on: arp.signature===s}"
              @click="arp.signature=s">{{s}}</button>
    </div>

    <div class="quant-info" v-if="quantizedLength !== null">
      cycle quantisé sur <span>{{quantizedLength}} pas</span>
      → boucle sur <span>{{beatsPerBar}} temps</span>
    </div>
  </div>

  <!-- Division -->
  <div class="panel">
    <div class="panel-label" style="display:flex;justify-content:space-between">
      <span>Division</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--accent)">{{arp.division}}</span>
    </div>
    <div class="div-slider-wrap">
      <div class="div-ticks">
        <div v-for="(d, i) in divisions" :key="d"
             class="div-tick"
             :class="[divType(d), {active: arp.division===d}]"
             @click="arp.division=d">
          <div class="div-tick-line"></div>
          <div class="div-tick-label">{{d.replace('1/','')}}</div>
        </div>
      </div>
      <div class="div-track"
           @mousedown="onDivDragStart"
           @touchstart.prevent="onDivTouchStart">
        <div class="div-thumb" :style="{left: divThumbPos + '%'}"></div>
      </div>
    </div>
  </div>

  <!-- Arpeggiator -->
  <div class="panel">
    <div class="panel-label">Arpeggiator</div>
    <div class="mode-grid">
      <button v-for="m in modes" class="mode-btn"
              :class="{on: arp.mode===m}"
              @click="arp.mode=m">
        {{m}}<span v-if="m==='chord'" class="chord-badge">∥</span>
      </button>
    </div>

    <div class="sep"></div>

    <div class="spin-row" style="margin-bottom:12px">
      <div class="spin-group">
        <div class="spin-label">OCT</div>
        <button class="spin-btn" @click="clamp('octaves',-1,1,4)">−</button>
        <div class="spin-val">{{arp.octaves}}</div>
        <button class="spin-btn" @click="clamp('octaves',+1,1,4)">+</button>
      </div>
      <div class="spin-group">
        <div class="spin-label">RPT</div>
        <button class="spin-btn" @click="clamp('repeat',-1,1,8)">−</button>
        <div class="spin-val">{{arp.repeat}}</div>
        <button class="spin-btn" @click="clamp('repeat',+1,1,8)">+</button>
      </div>
    </div>

    <div class="hold-block" :class="{active: hold}">
      <button class="hold-main-btn" :class="{active: hold}" @click="toggleHold">
        HOLD
      </button>
      <div class="hold-mode-btns" :class="{enabled: hold}">
        <button class="hold-mode-btn"
                :class="{active: holdMode==='accumulate'}"
                @click="hold && (holdMode='accumulate')">
          accumulate
        </button>
        <button class="hold-mode-btn"
                :class="{active: holdMode==='overwrite'}"
                @click="hold && (holdMode='overwrite')">
          overwrite
        </button>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="panel">
    <div class="panel-label" style="margin-bottom:6px">IN</div>
    <div class="notes-area">
      <div class="note-chip" v-for="n in (hold && heldNotes.length ? heldNotes : activeNotes)" :key="n">{{noteName(n)}}</div>
      <div v-if="!activeNotes.length && !heldNotes.length" style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">—</div>
    </div>
    <div class="sep"></div>
    <div class="panel-label" style="margin-bottom:6px">ARP</div>
    <div class="notes-area">
      <div class="note-chip arp" v-for="(n, i) in arpPattern" :key="i">{{noteName(n)}}</div>
      <div v-if="!arpPattern.length" style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">—</div>
    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      midi: { inId:null, outId:null, access:null },
      inputs: [],
      outputs: [],

      activeNotes: [],
      heldNotes: [],

      _chordTimer: null,
      CHORD_WAIT: 20,

      hold: false,
      arpOn: true,
      midiSync: false,
      midiBpm: null,
      midiPpqn: 4,
      _midiClockTimes: [],
      holdMode: "overwrite",
      freeClock: false,
      soundOn: false,

      modes: ["up","down","updown","random","order","chord"],

      divisions: [
        "1/4.","1/4","1/8.","1/4t",
        "1/8","1/16.","1/8t",
        "1/16","1/32.","1/16t",
        "1/32"
      ],

      signatures: ["4/4","3/4","5/4","7/4","6/8"],

      arp: {
        mode:"up",
        division:"1/16",
        signature:"4/4",
        bpm:120,
        stepIndex:0,
        octaves: 1,
        repeat: 1
      },

      _wakeLock: null,
      chordSnapshot: [],
      waitingForChord: false,
      _rafId: null,
      barProgressValue: 0,

      scheduler: {
        running:false,
        barStart:0,
        startTime:0,
        lastStepIndex:0
      }
    }
  },

  computed: {
    beatsPerBar() {
      const sig = this.arp.signature;
      if (sig === "6/8") return 2;
      return parseInt(sig.split("/")[0]);
    },

    beatDuration() {
      const sig = this.arp.signature;
      const base = 60000 / this.arp.bpm;
      if (sig === "6/8") return base * 1.5;
      return base;
    },

    stepsPerBeatDisplay() {
      const straight = { "1/4":1,"1/8":2,"1/16":4,"1/32":8,"1/64":16 };
      const base = this.arp.division.replace("t","").replace(".","");
      return straight[base] || 4;
    },

    displaySteps() {
      return this.beatsPerBar * this.stepsPerBeatDisplay;
    },

    barDuration() {
      return this.beatDuration * this.beatsPerBar;
    },

    divThumbPos() {
      const idx = this.divisions.indexOf(this.arp.division);
      if (idx < 0) return 0;
      return (idx / (this.divisions.length - 1)) * 100;
    },

    barProgress() {
      return this.barProgressValue;
    },

    quantizedLength() {
      const src = this.heldNotes.length ? this.heldNotes : this.activeNotes;
      if (!src.length) return null;
      const base = this.pickNotes([...src]);
      if (!base.length) return null;
      const beats = this.beatsPerBar;
      return Math.ceil(base.length / beats) * beats;
    },

    arpPattern() {
      const src = this.chordSnapshot.length ? this.chordSnapshot
                : this.heldNotes.length ? this.heldNotes
                : this.activeNotes;
      if (!src.length) return [];
      return this.pickNotes([...src]);
    },

    pulseDuration() {
      return (60 / this.arp.bpm) + 's';
    }
  },

  mounted() {
    this.initMIDI();
    this.startRAF();
    if (!this.freeClock) this.startClock();
    this.acquireWakeLock();
  },

  beforeUnmount() {
    if (this._rafId) cancelAnimationFrame(this._rafId);
    if (this._wakeLock) this._wakeLock.release();
  },

  watch: {
    "arp.division"() { this.resyncClock(); },
    "arp.bpm"()      { this.resyncClock(); }
  },

  methods: {

    async acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        this._wakeLock = await navigator.wakeLock.request('screen');
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState === 'visible') {
            try { this._wakeLock = await navigator.wakeLock.request('screen'); } catch {}
          }
        });
      } catch {}
    },

    startRAF() {
      const tick = () => {
        if (this.scheduler.running) {
          const now = performance.now();
          this.barProgressValue = ((now - this.scheduler.barStart) % this.barDuration) / this.barDuration;
        }
        this._rafId = requestAnimationFrame(tick);
      };
      this._rafId = requestAnimationFrame(tick);
    },

    divIndexFromEvent(clientX, el) {
      const rect = el.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return Math.round(ratio * (this.divisions.length - 1));
    },

    onDivDragStart(e) {
      const track = e.currentTarget;
      this.arp.division = this.divisions[this.divIndexFromEvent(e.clientX, track)];
      const onMove = (me) => {
        this.arp.division = this.divisions[this.divIndexFromEvent(me.clientX, track)];
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    },

    onDivTouchStart(e) {
      const track = e.currentTarget;
      this.arp.division = this.divisions[this.divIndexFromEvent(e.touches[0].clientX, track)];
      const onMove = (te) => {
        this.arp.division = this.divisions[this.divIndexFromEvent(te.touches[0].clientX, track)];
      };
      const onEnd = () => {
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onEnd);
      };
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('touchend', onEnd);
    },

    clamp(key, delta, min, max) {
      this.arp[key] = Math.min(max, Math.max(min, this.arp[key] + delta));
    },

    divType(d) {
      if (d.includes("t")) return "triplet";
      if (d.includes(".")) return "dotted";
      return "";
    },

    noteName(n) {
      const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
      return names[n % 12] + (Math.floor(n/12)-1);
    },

    async initMIDI() {
      try {
        const access = await navigator.requestMIDIAccess();
        this.midi.access = access;
        this.inputs  = [...access.inputs.values()].map(i=>({id:i.id,name:i.name}));
        this.outputs = [...access.outputs.values()].map(o=>({id:o.id,name:o.name}));
        if (this.inputs.length)  this.midi.inId  = this.inputs[0].id;
        if (this.outputs.length) this.midi.outId = this.outputs[0].id;
        access.inputs.forEach(input => { input.onmidimessage = this.onMIDIIn; });
      } catch(e) {
        console.warn("MIDI access denied:", e);
      }
    },

    getOut() {
      return this.midi.access?.outputs.get(this.midi.outId);
    },

    onMIDIIn(e) {
      const data = e.data;
      const status = data[0];
      const note   = data[1];
      const vel    = data[2];
      const cmd    = status & 0xf0;

      // MIDI Clock
      if (status === 0xF8) { if (this.midiSync) this.onMidiClockTick(); return; }
      if (status === 0xFA || status === 0xFB) {
        if (this.midiSync) { this._midiClockTimes = []; this.resetClock(); if (!this.scheduler.running) this.startClock(); }
        return;
      }
      if (status === 0xFC) { if (this.midiSync) this.stopClock(); return; }

      // Notes/CC : input sélectionné seulement
      if (e.target.id !== this.midi.inId) return;

      // Passe-through CC
      if (cmd === 176 && note !== 64) {
        const out = this.getOut();
        if (out) out.send(e.data);
      }

      // Note On
      if (cmd === 144 && vel > 0) {
        if (!this.activeNotes.includes(note)) this.activeNotes.push(note);

        if (this.hold && this.holdMode === 'accumulate') {
          // accumulate : on ajoute au held existant
          this.heldNotes = [...new Set([...this.heldNotes, ...this.activeNotes])];
        } else {
          // sans hold ou hold+overwrite : heldNotes suit activeNotes exactement
          this.heldNotes = [...this.activeNotes];
        }
        this.armChordBuffer();
      }

      // Note Off
      if (cmd === 128 || (cmd === 144 && vel === 0)) {
        this.activeNotes = this.activeNotes.filter(x => x !== note);

        if (this.hold && this.holdMode === 'accumulate') {
          // accumulate : on ne touche à rien sur note-off, les notes restent
        } else if (this.hold && this.holdMode === 'overwrite') {
          // On ne met à jour le snapshot que si activeNotes n'est pas vide
          // ET qu'on est encore en train de construire l'accord (pas de relâcher)
          // → on laisse le buffer gérer la capture, le note-off ne touche à rien
          // sauf pour annuler le buffer si on relâche tout
          if (this.activeNotes.length === 0) {
            // tout relâché : buffer annulé, snapshot gardé
            if (this._chordTimer) { clearTimeout(this._chordTimer); this._chordTimer = null; }
            this.waitingForChord = false;
          }
          // notes restantes pendant le relâcher → on ne touche à rien,
          // le snapshot en cours reste valide
        } else {
          // sans hold : suit activeNotes, vide si rien
          this.heldNotes = [...this.activeNotes];
          if (this.activeNotes.length === 0) {
            this.chordSnapshot = [];
            if (this._chordTimer) { clearTimeout(this._chordTimer); this._chordTimer = null; }
            this.waitingForChord = false;
          } else {
            this.chordSnapshot = [...this.activeNotes];
          }
        }
      }

      // CC64 sustain → hold
      if (cmd === 176 && note === 64) {
        this.hold = vel > 63;
        if (!this.hold) this.clearHold();
      }

      this.updateClockGate();
    },

    clearHold() {
      this.heldNotes = [];
      this.chordSnapshot = [];
      if (this._chordTimer) { clearTimeout(this._chordTimer); this._chordTimer = null; }
      this.waitingForChord = false;
    },

    toggleHold() {
      this.hold = !this.hold;
      if (!this.hold) this.clearHold();
    },

    armChordBuffer() {
      if (this._chordTimer) clearTimeout(this._chordTimer);
      this.waitingForChord = true;

      // free clock : démarre immédiatement sur premier accord
      if (this.freeClock && this.chordSnapshot.length === 0) {
        const src = (this.hold && this.holdMode === 'accumulate') ? this.heldNotes : this.activeNotes;
        if (src.length) {
          this.chordSnapshot = [...src];
          this.arp.stepIndex = 0;
          this.waitingForChord = false;
        }
      }

      this._chordTimer = setTimeout(() => {
        // accumulate : snapshot = heldNotes complet
        // overwrite + sans hold : snapshot = activeNotes à cet instant
        const snapshot = (this.hold && this.holdMode === 'accumulate')
          ? [...this.heldNotes]
          : [...this.activeNotes];

        if (!snapshot.length) {
          this.waitingForChord = false;
          this._chordTimer = null;
          return;
        }

        const wasEmpty = this.chordSnapshot.length === 0;
        this.chordSnapshot = snapshot;
        if (wasEmpty) this.arp.stepIndex = 0;

        this.waitingForChord = false;
        this._chordTimer = null;
      }, this.CHORD_WAIT);
    },

    toggleMidiSync() {
      this.midiSync = !this.midiSync;
      if (!this.midiSync) {
        this._midiClockTimes = [];
        this.midiBpm = null;
        if (!this.scheduler.running && !this.freeClock) this.startClock();
      } else {
        this.stopClock();
        this._midiClockTimes = [];
      }
    },

    onMidiClockTick() {
      const now = performance.now();
      this._midiClockTimes.push(now);
      if (this._midiClockTimes.length > this.midiPpqn) this._midiClockTimes.shift();

      if (this._midiClockTimes.length >= Math.min(4, this.midiPpqn)) {
        const len = this._midiClockTimes.length;
        const elapsed = this._midiClockTimes[len-1] - this._midiClockTimes[0];
        const bpm = Math.round(60000 / (elapsed / (len-1) * this.midiPpqn));
        if (bpm !== this.arp.bpm) {
          this.arp.bpm = bpm;
          this.midiBpm = bpm;
          this.resyncClock();
        }
      }

      if (!this.scheduler.running) { this.resetClock(); this.startClock(); }
    },

    toggleFreeClock() {
      this.freeClock = !this.freeClock;
      if (this.freeClock) {
        const hasNotes = this.activeNotes.length > 0 || this.heldNotes.length > 0;
        if (!hasNotes) this.stopClock();
      } else {
        if (!this.scheduler.running) this.startClock();
      }
    },

    updateClockGate() {
      const hasNotes = this.activeNotes.length > 0 || this.heldNotes.length > 0;
      if (this.freeClock) {
        if (hasNotes && !this.scheduler.running) { this.resetClock(); this.startClock(); }
        if (!hasNotes && this.scheduler.running) this.stopClock();
      }
    },

    resetClock() {
      this.arp.stepIndex = 0;
      this.scheduler.barStart      = performance.now();
      this.scheduler.startTime     = performance.now();
      this.scheduler.lastStepIndex = -1;
    },

    startClock() {
      if (this.scheduler.running) return;
      this.scheduler.running       = true;
      this.scheduler.startTime     = performance.now();
      this.scheduler.barStart      = performance.now();
      this.scheduler.lastStepIndex = -1;

      const tick = () => {
        if (!this.scheduler.running) return;
        const now     = performance.now();
        const stepDur = this.stepDuration();
        const index   = Math.floor((now - this.scheduler.startTime) / stepDur);

        while (now - this.scheduler.barStart >= this.barDuration)
          this.scheduler.barStart += this.barDuration;

        while (this.scheduler.lastStepIndex < index) {
          this.scheduler.lastStepIndex++;
          const stepTime = this.scheduler.startTime + this.scheduler.lastStepIndex * stepDur;
          this.scheduleStep(stepTime);
        }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    },

    stopClock() {
      this.scheduler.running = false;
      this.arp.stepIndex = 0;
    },

    resyncClock() {
      if (!this.scheduler.running) return;
      const now     = performance.now();
      const stepDur = this.stepDuration();
      const index   = Math.floor((now - this.scheduler.startTime) / stepDur);
      this.scheduler.startTime     = now - index * stepDur;
      this.scheduler.lastStepIndex = index - 1;
    },

    scheduleStep(stepTime) {
      if (!this.arpOn) return;

      let src;
      if (this.waitingForChord) {
        if (this.chordSnapshot.length) src = this.chordSnapshot;
        else return;
      } else {
        src = this.chordSnapshot.length ? this.chordSnapshot
            : (this.heldNotes.length ? this.heldNotes : this.activeNotes);
      }
      if (!src.length) return;

      const notes = this.pickNotes([...src]);
      if (!notes.length) return;

      const beats          = this.beatsPerBar;
      const stepsPerBarCount = beats * this.stepsPerBeatDisplay;
      const rawLen         = notes.length;
      const quantLen       = Math.ceil(rawLen / stepsPerBarCount) * stepsPerBarCount;
      const idx            = this.arp.stepIndex % quantLen;
      const n              = notes[idx % rawLen];

      const out         = this.getOut();
      const dur         = this.stepDuration();
      const audioDelay  = Math.max(0, stepTime - performance.now());

      if (this.arp.mode === "chord") {
        if (out) for (const cn of src) {
          out.send([144, cn, 100]);
          setTimeout(() => out.send([128, cn, 0]), dur * 0.8);
        }
        if (this.soundOn) for (const cn of src) this.playTone(cn, dur * 0.8, audioDelay);
      } else {
        if (out) {
          out.send([144, n, 100]);
          setTimeout(() => out.send([128, n, 0]), dur * 0.8);
        }
        if (this.soundOn) this.playTone(n, dur * 0.8, audioDelay);
      }

      this.arp.stepIndex++;
    },

    getAudioCtx() {
      if (!this._audioCtx) {
        this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this._compressor = this._audioCtx.createDynamicsCompressor();
        this._compressor.connect(this._audioCtx.destination);
      }
      if (this._audioCtx.state === 'suspended') this._audioCtx.resume();
      return this._audioCtx;
    },

    playTone(midiNote, durationMs, delayMs = 0) {
      const ctx   = this.getAudioCtx();
      const freq  = 440 * Math.pow(2, (midiNote - 69) / 12);
      const start = ctx.currentTime + delayMs / 1000;
      const dur   = durationMs / 1000;
      const osc   = ctx.createOscillator();
      const gain  = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.18, start + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
      osc.connect(gain);
      gain.connect(this._compressor);
      osc.start(start);
      osc.stop(start + dur + 0.01);
    },

    stepDuration() {
      const map = {
        "1/4":1, "1/8":0.5, "1/16":0.25, "1/32":0.125,
        "1/4t":2/3, "1/8t":1/3, "1/16t":1/6, "1/32t":1/12,
        "1/4.":1.5, "1/8.":0.75, "1/16.":0.375, "1/32.":0.1875
      };
      return this.beatDuration * (map[this.arp.division] || 0.25);
    },

    applyOctaves(notes) {
      const oct = Math.max(1, this.arp.octaves || 1);
      const result = [];
      for (let i = 0; i < oct; i++)
        result.push(...notes.map(n => Math.min(127, n + i * 12)));
      return result;
    },

    applyRepeat(notes) {
      const rep = Math.max(1, this.arp.repeat || 1);
      const out = [];
      for (const n of notes)
        for (let i = 0; i < rep; i++) out.push(n);
      return out;
    },

    pickNotes(notes) {
      if (!notes.length) return [];
      if (this.arp.mode === "chord") return notes;

      let base;
      switch(this.arp.mode) {
        case "up":     base = [...notes].sort((a,b)=>a-b); break;
        case "down":   base = [...notes].sort((a,b)=>b-a); break;
        case "random": base = [...notes].sort(()=>Math.random()-0.5); break;
        case "order":  base = notes; break;
        case "updown": {
          const up   = [...notes].sort((a,b)=>a-b);
          const down = [...up].reverse().slice(1,-1);
          base = [...up, ...down];
          break;
        }
        default: base = notes;
      }
      base = this.applyOctaves(base);
      base = this.applyRepeat(base);
      return base;
    }
  }
}).mount("#app");
</script>
</body>
</html>
