<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARP — MIDI Arpeggiator</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --panel: #111116;
  --border: #1e1e28;
  --accent: #c8ff00;
  --accent2: #ff6b35;
  --muted: #3a3a48;
  --text: #e8e8f0;
  --text-dim: #6a6a80;
  --beat: #2a2a38;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 10px 40px;
}

#app {
  width: 100%;
  max-width: 460px;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
}

.header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.midi-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.midi-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.2s;
}

.midi-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* Panels */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
}

.panel-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-bottom: 10px;
}

/* MIDI row */
.midi-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

.midi-row select {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--mono);
  outline: none;
  cursor: pointer;
}

.midi-row select:focus { border-color: var(--accent); }

/* Chip button */
.btn {
  background: var(--bg);
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  user-select: none;
}

.btn:hover { border-color: var(--muted); color: var(--text); }

.btn.on {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 700;
}

.btn.on2 {
  background: var(--accent2);
  color: #000;
  border-color: var(--accent2);
  font-weight: 700;
}

/* Mode grid */
.mode-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  margin-bottom: 10px;
}

.mode-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-align: center;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}

.mode-btn:hover { border-color: var(--muted); color: var(--text); }

.mode-btn.on {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 700;
}

/* Division grid */
.div-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.div-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 2px;
  border-radius: 5px;
  font-size: 10px;
  font-family: var(--mono);
  text-align: center;
  cursor: pointer;
  transition: all 0.1s;
  user-select: none;
}

.div-btn:hover { border-color: var(--muted); }
.div-btn.on { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.div-btn.triplet { color: var(--accent2); }
.div-btn.triplet.on { background: var(--accent2); color: #000; border-color: var(--accent2); }
.div-btn.dotted { color: #88aaff; }
.div-btn.dotted.on { background: #88aaff; color: #000; border-color: #88aaff; }

.div-labels {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}

.div-label {
  font-size: 8px;
  font-family: var(--mono);
  text-align: center;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

/* Tempo */
.tempo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.bpm-display {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  min-width: 70px;
}

.bpm-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.bpm-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.bpm-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 0 8px var(--accent);
}

/* Signature */
.sig-row {
  display: flex;
  gap: 5px;
  margin-bottom: 14px;
}

.sig-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-family: var(--mono);
  cursor: pointer;
  transition: all 0.1s;
  user-select: none;
}

.sig-btn.on { background: var(--beat); color: var(--text); border-color: var(--muted); }

/* Sequencer grid */
.seq-wrap {
  position: relative;
}

.seq-grid {
  display: flex;
  gap: 2px;
  height: 20px;
  align-items: stretch;
}

.seq-cell {
  flex: 1;
  border-radius: 2px;
  background: var(--bg);
  border: 1px solid var(--border);
  transition: background 0.05s;
  position: relative;
}

.seq-cell.beat-start {
  border-color: var(--muted);
}

.seq-cell.active {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 4px var(--accent);
}

/* Bar progress bar */
.bar-prog {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-bottom: 6px;
  overflow: hidden;
}

.bar-prog-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.04s linear;
}

/* Spinbox-style controls */
.spin-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.spin-group {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.spin-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--mono);
  padding: 0 8px;
  background: var(--bg);
  height: 28px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
}

.spin-btn {
  background: var(--bg);
  color: var(--text-dim);
  border: none;
  width: 26px;
  height: 28px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}

.spin-btn:hover { background: var(--beat); color: var(--text); }

.spin-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  min-width: 24px;
  text-align: center;
  background: var(--bg);
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 2px;
}

/* Notes display */
.notes-area {
  min-height: 30px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: center;
}

.note-chip {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 4px;
  background: var(--beat);
  color: var(--text);
  border: 1px solid var(--muted);
  animation: pop 0.1s ease;
}

.note-chip.arp {
  background: color-mix(in srgb, var(--accent) 15%, var(--bg));
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  color: var(--accent);
}

@keyframes pop {
  from { transform: scale(0.85); opacity: 0.5; }
  to { transform: scale(1); opacity: 1; }
}

/* Quantize info */
.quant-info {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-top: 6px;
}

.quant-info span {
  color: var(--accent2);
}

/* Two cols */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* Toggle row */
.toggle-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Separator */
.sep {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}

/* Free clock warning */
.free-tag {
  font-size: 9px;
  color: var(--accent2);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.2s;
}
.free-tag.show { opacity: 1; }

/* Chord badge */
.chord-badge {
  font-size: 9px;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-left: 4px;
}

/* Division slider */
.div-slider-wrap {
  margin-top: 4px;
}

.div-ticks {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  padding: 0 2px;
}

.div-tick {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  gap: 3px;
  flex: 1;
}

.div-tick-line {
  width: 1px;
  height: 8px;
  background: var(--muted);
  transition: all 0.1s;
}

.div-tick.active .div-tick-line {
  background: var(--accent);
  width: 2px;
  height: 12px;
}

.div-tick.triplet .div-tick-line { background: var(--accent2); opacity: 0.5; }
.div-tick.triplet.active .div-tick-line { background: var(--accent2); opacity: 1; }
.div-tick.dotted .div-tick-line { background: #88aaff; opacity: 0.5; }
.div-tick.dotted.active .div-tick-line { background: #88aaff; opacity: 1; }

.div-tick-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-dim);
  transition: color 0.1s;
}

.div-tick.active .div-tick-label { color: var(--accent); }
.div-tick.triplet .div-tick-label { color: var(--accent2); opacity: 0.6; }
.div-tick.triplet.active .div-tick-label { opacity: 1; }
.div-tick.dotted .div-tick-label { color: #88aaff; opacity: 0.6; }
.div-tick.dotted.active .div-tick-label { opacity: 1; }

.div-track {
  position: relative;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  margin: 0 2px;
}

.div-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  pointer-events: none;
}

/* Hold block */
.hold-block {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.hold-block.active {
  border-color: var(--accent);
}

.hold-main-btn {
  background: var(--bg);
  color: var(--text-dim);
  border: none;
  border-right: 1px solid var(--border);
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
}

.hold-main-btn.active {
  background: var(--accent);
  color: #000;
  border-right-color: var(--accent);
}

.hold-mode-btns {
  display: flex;
  flex-direction: column;
  flex: 1;
  opacity: 0.35;
  transition: opacity 0.15s;
}

.hold-mode-btns.enabled {
  opacity: 1;
}

.hold-mode-btn {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  cursor: pointer;
  padding: 0 12px;
  text-align: left;
  transition: all 0.1s;
}

.hold-mode-btn:last-child { border-bottom: none; }

.hold-mode-btn.active {
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, transparent);
}

.hold-mode-btn:hover { color: var(--text); }


@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.running-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse var(--pulse-dur, 1s) steps(1, end) infinite;
  margin-right: 5px;
  vertical-align: middle;
}
.stopped-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  margin-right: 5px;
  vertical-align: middle;
}
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div class="header">
    <h1>ARP</h1>
    <div class="subtitle">MIDI Arpeggiator</div>
    <div class="midi-status">
      <div class="midi-dot" :class="{on: midi.access}"></div>
      MIDI
    </div>
  </div>

  <!-- MIDI I/O + Sound + On/Off -->
  <div class="panel">
    <div class="panel-label">MIDI</div>
    <div class="midi-row">
      <button class="btn" @click="initMIDI">Init</button>
      <select v-model="midi.inId">
        <option v-for="i in inputs" :value="i.id">↓ {{i.name}}</option>
        <option v-if="!inputs.length" :value="null">— no input —</option>
      </select>
      <select v-model="midi.outId">
        <option v-for="o in outputs" :value="o.id">↑ {{o.name}}</option>
        <option v-if="!outputs.length" :value="null">— no output —</option>
      </select>
    </div>
    <div class="sep"></div>
    <div class="toggle-row">
      <button class="btn" :class="{on: arpOn}" @click="arpOn=!arpOn">
        {{ arpOn ? '▶ ON' : '■ OFF' }}
      </button>
      <button class="btn" :class="{on: soundOn}" @click="soundOn=!soundOn">♪ SOUND</button>
    </div>
  </div>

  <!-- Clock / Tempo + Free + Sync -->
  <div class="panel">
    <div class="panel-label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span>
        <span v-if="scheduler.running"><span class="running-dot" :style="{'--pulse-dur': pulseDuration}"></span>Running</span>
        <span v-else><span class="stopped-dot"></span>Stopped</span>
      </span>
      <span style="display:flex;gap:5px;align-items:center">
        <button class="btn" :class="{on: freeClock}" @click="toggleFreeClock">FREE</button>
        <button class="btn" :class="{on: midiSync}" @click="toggleMidiSync">
          SYNC<span v-if="midiSync && midiBpm"> {{midiBpm}}</span>
        </button>
        <select v-if="midiSync" v-model.number="midiPpqn" style="background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 6px;border-radius:5px;font-size:10px;font-family:var(--mono)">
          <option :value="1">1 PPQ</option>
          <option :value="2">2 PPQ</option>
          <option :value="4">4 PPQ</option>
          <option :value="8">8 PPQ</option>
          <option :value="24">24 PPQ</option>
          <option :value="48">48 PPQ</option>
        </select>
      </span>
    </div>

    <!-- Signature -->
    <div class="sig-row">
      <button v-for="s in signatures"
              class="sig-btn"
              :class="{on: arp.signature===s}"
              @click="arp.signature=s">{{s}}</button>
    </div>

    <!-- Bar progress -->
    <!-- <div class="bar-prog">
      <div class="bar-prog-fill" :style="{width: (barProgress*100)+'%'}"></div>
    </div> -->

    <div class="tempo-row">
      <div>
        <div class="bpm-display">{{arp.bpm}}</div>
        <div class="bpm-sub">BPM</div>
      </div>
      <input type="range" class="bpm-slider" min="40" max="240" v-model.number="arp.bpm"/>
    </div>

    <!-- Sequencer grid -->
    <div class="seq-grid">
      <div v-for="i in displaySteps"
           :key="i"
           :class="{
             'seq-cell': true,
             'active': (i-1) === (arp.stepIndex % displaySteps),
             'beat-start': (i-1) % stepsPerBeatDisplay === 0
           }">
      </div>
    </div>

    <div class="quant-info" v-if="quantizedLength !== null">
      cycle quantisé sur <span>{{quantizedLength}} pas</span>
      → boucle sur <span>{{beatsPerBar}} temps</span>
    </div>
  </div>

  <!-- Division -->
  <div class="panel">
    <div class="panel-label" style="display:flex;justify-content:space-between">
      <span>Division</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--accent)">{{arp.division}}</span>
    </div>
    <div class="div-slider-wrap">
      <div class="div-ticks">
        <div v-for="(d, i) in divisions" :key="d"
             class="div-tick"
             :class="[divType(d), {active: arp.division===d}]"
             @click="arp.division=d">
          <div class="div-tick-line"></div>
          <div class="div-tick-label">{{d.replace('1/','')}}</div>
        </div>
      </div>
      <div class="div-track"
           @mousedown="onDivDragStart"
           @touchstart.prevent="onDivTouchStart">
        <div class="div-thumb" :style="{left: divThumbPos + '%'}"></div>
      </div>
    </div>
  </div>

  <!-- Arpeggiator : Mode + Hold + Oct + Repeat -->
  <div class="panel">
    <div class="panel-label">Arpeggiator</div>
    <div class="mode-grid">
      <button v-for="m in modes"
              class="mode-btn"
              :class="{on: arp.mode===m}"
              @click="arp.mode=m">
        {{m}}<span v-if="m==='chord'" class="chord-badge">∥</span>
      </button>
    </div>

    <div class="sep"></div>

    <div class="spin-row" style="margin-bottom:12px">
      <div class="spin-group">
        <div class="spin-label">OCT</div>
        <button class="spin-btn" @click="clamp('octaves',-1,1,4)">−</button>
        <div class="spin-val">{{arp.octaves}}</div>
        <button class="spin-btn" @click="clamp('octaves',+1,1,4)">+</button>
      </div>
      <div class="spin-group">
        <div class="spin-label">RPT</div>
        <button class="spin-btn" @click="clamp('repeat',-1,1,8)">−</button>
        <div class="spin-val">{{arp.repeat}}</div>
        <button class="spin-btn" @click="clamp('repeat',+1,1,8)">+</button>
      </div>
    </div>

    <!-- Hold — grand bloc avec mode lié visuellement -->
    <div class="hold-block" :class="{active: hold}">
      <button class="hold-main-btn" :class="{active: hold}" @click="toggleHold">
        HOLD
      </button>
      <div class="hold-mode-btns" :class="{enabled: hold}">
        <button class="hold-mode-btn"
                :class="{active: holdMode==='accumulate'}"
                @click="hold && (holdMode='accumulate')">
          accumulate
        </button>
        <button class="hold-mode-btn"
                :class="{active: holdMode==='overwrite'}"
                @click="hold && (holdMode='overwrite')">
          overwrite
        </button>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="panel">
    <div class="panel-label" style="margin-bottom:6px">IN</div>
    <div class="notes-area">
      <div class="note-chip" v-for="n in activeNotes" :key="n">{{noteName(n)}}</div>
      <div v-if="!activeNotes.length" style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">—</div>
    </div>
    <div class="sep"></div>
    <div class="panel-label" style="margin-bottom:6px">ARP</div>
    <div class="notes-area">
      <div class="note-chip arp" v-for="n in heldNotes" :key="n">{{noteName(n)}}</div>
      <div v-if="!heldNotes.length" style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">—</div>
    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      midi: { inId:null, outId:null, access:null },
      inputs: [],
      outputs: [],

      activeNotes: [],
      heldNotes: [],

      // Chord buffer : on attend CHORD_WAIT ms après la dernière note-on
      // avant de valider l'accord et de repartir du step 0
      _chordTimer: null,
      CHORD_WAIT: 20,
      _peakCount: 0,
      _peakNotes: [],

      hold: false,
      arpOn: true,
      midiSync: false,
      midiBpm: null,
      midiPpqn: 4,           // 4 par défaut pour Minifreak, 24 pour standard
      _midiClockTimes: [],
      holdMode: "overwrite",
      freeClock: false,
      soundOn: false,

      modes: ["up","down","updown","random","order","chord"],

      // Divisions : du plus lent au plus vite, sans les 64e et 32.
      divisions: [
        "1/4.",
        "1/4", "1/8.", "1/4t",
        "1/8", "1/16.", "1/8t",
        "1/16", "1/32.", "1/16t",
        "1/32"
      ],

      signatures: ["4/4","3/4","5/4","7/4","6/8"],

      arp: {
        mode:"up",
        division:"1/16",
        signature:"4/4",
        bpm:120,
        stepIndex:0,
        octaves: 1,
        repeat: 1
      },

      _wakeLock: null,

      // snapshot validé après le buffer — c'est ce que l'arp joue vraiment
      chordSnapshot: [],
      // true pendant le buffer : le clock tourne mais joue le snapshot précédent
      waitingForChord: false,
      _rafId: null,

      scheduler: {
        running:false,
        barStart:0,
        startTime:0,
        lastStepIndex:0
      }
    }
  },

  computed: {
    beatsPerBar() {
      const sig = this.arp.signature;
      if (sig === "6/8") return 2; // 6/8 → 2 temps composés
      return parseInt(sig.split("/")[0]);
    },

    // Durée d'un beat en ms
    beatDuration() {
      const sig = this.arp.signature;
      const base = 60000 / this.arp.bpm;
      if (sig === "6/8") return base * 1.5; // noire pointée
      return base;
    },

    // Combien de steps par beat (toujours entier)
    stepsPerBeatDisplay() {
      const div = this.arp.division;
      const straight = { "1/4":1,"1/8":2,"1/16":4,"1/32":8,"1/64":16 };
      // Pour les triplets et pointés on retourne la valeur straight la plus proche
      const base = div.replace("t","").replace(".","");
      return straight[base] || 4;
    },

    displaySteps() {
      return this.beatsPerBar * this.stepsPerBeatDisplay;
    },

    barDuration() {
      return this.beatDuration * this.beatsPerBar;
    },

    divThumbPos() {
      const idx = this.divisions.indexOf(this.arp.division);
      if (idx < 0) return 0;
      return (idx / (this.divisions.length - 1)) * 100;
    },

    barProgress() {
      return this.barProgressValue;
    },

    // Quantize: si on a N notes, on les aligne sur un multiple de beatsPerBar
    quantizedLength() {
      const n = this.heldNotes.length || this.activeNotes.length;
      if (!n) return null;
      const beats = this.beatsPerBar;
      // On calcule la taille réelle du pattern avec octaves/repeat
      const base = this.pickNotes([...(this.heldNotes.length ? this.heldNotes : this.activeNotes)]);
      const len = base.length;
      if (len === 0) return null;
      // multiple de beats le plus proche ≥ len
      const mult = Math.ceil(len / beats) * beats;
      return mult;
    },

    // Durée d'un beat en secondes pour synchroniser le clignotement
    pulseDuration() {
      const beatSeconds = 60 / this.arp.bpm;
      return beatSeconds + 's';
    }
  },

  mounted() {
    this.initMIDI();
    this.startRAF();
    if (!this.freeClock) {
      this.startClock();
    }
    this.acquireWakeLock();
  },

  beforeUnmount() {
    if (this._rafId) cancelAnimationFrame(this._rafId);
    if (this._wakeLock) this._wakeLock.release();
  },

  watch: {
    "arp.division"() { this.resyncClock(); },
    "arp.bpm"() { this.resyncClock(); }
  },

  methods: {

    // RAF pour barProgress réactif
    async acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        this._wakeLock = await navigator.wakeLock.request('screen');
        // Re-acquiert si la page redevient visible (ex: retour d'onglet)
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState === 'visible') {
            try { this._wakeLock = await navigator.wakeLock.request('screen'); } catch {}
          }
        });
      } catch {}
    },

    startRAF() {
      const tick = () => {
        if (this.scheduler.running) {
          const now = performance.now();
          const dur = this.barDuration;
          this.barProgressValue = ((now - this.scheduler.barStart) % dur) / dur;
        }
        this._rafId = requestAnimationFrame(tick);
      };
      this._rafId = requestAnimationFrame(tick);
    },

    divIndexFromEvent(clientX, el) {
      const rect = el.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return Math.round(ratio * (this.divisions.length - 1));
    },

    onDivDragStart(e) {
      const track = e.currentTarget;
      this.arp.division = this.divisions[this.divIndexFromEvent(e.clientX, track)];
      const onMove = (me) => {
        this.arp.division = this.divisions[this.divIndexFromEvent(me.clientX, track)];
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    },

    onDivTouchStart(e) {
      const track = e.currentTarget;
      const touch = e.touches[0];
      this.arp.division = this.divisions[this.divIndexFromEvent(touch.clientX, track)];
      const onMove = (te) => {
        this.arp.division = this.divisions[this.divIndexFromEvent(te.touches[0].clientX, track)];
      };
      const onEnd = () => {
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onEnd);
      };
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('touchend', onEnd);
    },

    onDivTrackClick(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const idx = Math.round(ratio * (this.divisions.length - 1));
      this.arp.division = this.divisions[idx];
    },

    clamp(key, delta, min, max) {
      this.arp[key] = Math.min(max, Math.max(min, this.arp[key] + delta));
    },

    divType(d) {
      if (d.includes("t")) return "triplet";
      if (d.includes(".")) return "dotted";
      return "";
    },

    noteName(n) {
      const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
      return names[n % 12] + (Math.floor(n/12)-1);
    },

    async initMIDI() {
      try {
        const access = await navigator.requestMIDIAccess();
        this.midi.access = access;
        this.inputs  = [...access.inputs.values()].map(i=>({id:i.id,name:i.name}));
        this.outputs = [...access.outputs.values()].map(o=>({id:o.id,name:o.name}));
        if (this.inputs.length)  this.midi.inId  = this.inputs[0].id;
        if (this.outputs.length) this.midi.outId = this.outputs[0].id;
        access.inputs.forEach(input => { input.onmidimessage = this.onMIDIIn; });
      } catch(e) {
        console.warn("MIDI access denied:", e);
      }
    },

    getOut() {
      return this.midi.access?.outputs.get(this.midi.outId);
    },

    onMIDIIn(e) {
      const data = e.data;
      const status = data[0];
      const note   = data[1];
      const vel    = data[2];
      const cmd    = status & 0xf0;

      // === MIDI Clock (messages système 1 octet) ===
      if (status === 0xF8) {
        if (this.midiSync) this.onMidiClockTick();
        return;
      }
      if (status === 0xFA || status === 0xFB) {
        if (this.midiSync) {
          this._midiClockTimes = [];
          this.resetClock();
          if (!this.scheduler.running) this.startClock();
        }
        return;
      }
      if (status === 0xFC) {
        if (this.midiSync) this.stopClock();
        return;
      }

      // Pour les messages note/CC : seulement depuis l'input sélectionné
      if (e.target.id !== this.midi.inId) return;

      // Passe-through CC
      if (cmd === 176 && note !== 64) {
        const out = this.getOut();
        if (out) out.send(e.data);
      }

      // Note On
      if (cmd === 144 && vel > 0) {
        if (this.hold && this.holdMode === "overwrite" && this.activeNotes.length === 0) {
          this.heldNotes = [];
        }
        if (!this.activeNotes.includes(note)) this.activeNotes.push(note);
        if (this.hold) {
          this.syncHoldNotes();
          // On mémorise le pic : le plus grand accord enfoncé simultanément
          if (this.activeNotes.length >= this._peakCount) {
            this._peakCount = this.activeNotes.length;
            this._peakNotes = [...this.activeNotes];
          }
        } else {
          this.heldNotes = [...this.activeNotes];
        }
        this.armChordBuffer();
      }

      // Note Off
      if (cmd === 128 || (cmd === 144 && vel === 0)) {
        this.activeNotes = this.activeNotes.filter(x => x !== note);

        if (!this.hold) {
          this.heldNotes = [...this.activeNotes];
          if (this.activeNotes.length === 0) {
            this.chordSnapshot = [];
            if (this._chordTimer) { clearTimeout(this._chordTimer); this._chordTimer = null; }
            this.waitingForChord = false;
          } else {
            this.chordSnapshot = [...this.activeNotes];
          }
        } else {
          if (this.activeNotes.length === 0 && this._peakNotes.length > 0) {
            if (this.holdMode === 'overwrite') {
              // overwrite : on valide le pic comme snapshot au relâcher
              this.heldNotes = [...this._peakNotes];
              this.chordSnapshot = [...this._peakNotes];
            }
            this._peakCount = 0;
            this._peakNotes = [];
          }
        }
      }

      // CC64 = sustain pédal → hold
      if (cmd === 176 && note === 64) {
        this.hold = vel > 63;
        if (!this.hold) this.clearHold();
      }

      this.updateClockGate();
    },

    syncHoldNotes() {
      if (this.holdMode === "overwrite") {
        // Repart de zéro avec uniquement les notes physiquement enfoncées
        this.heldNotes = [...this.activeNotes].sort((a,b)=>a-b);
      } else {
        this.heldNotes = [...new Set([...this.heldNotes, ...this.activeNotes])];
      }
    },

    clearHold() {
      this.heldNotes = [];
      this.chordSnapshot = [];
      this._peakCount = 0;
      this._peakNotes = [];
      if (this._chordTimer) { clearTimeout(this._chordTimer); this._chordTimer = null; }
      this.waitingForChord = false;
    },

    toggleHold() {
      this.hold = !this.hold;
      if (!this.hold) this.clearHold();
    },

    toggleHoldMode() {
      this.holdMode = this.holdMode === "overwrite" ? "accumulate" : "overwrite";
    },

    armChordBuffer() {
      if (this._chordTimer) clearTimeout(this._chordTimer);
      this.waitingForChord = true;

      if (this.freeClock && this.chordSnapshot.length === 0) {
        const src = (this.hold && this.holdMode === 'overwrite') ? this.activeNotes
                  : this.hold ? this.heldNotes
                  : this.activeNotes;
        if (src.length) {
          this.chordSnapshot = [...src];
          this.arp.stepIndex = 0;
          this.waitingForChord = false;
        }
      }

      this._chordTimer = setTimeout(() => {
        // hold+overwrite : on prend activeNotes (les doigts réellement enfoncés
        // au moment où le buffer expire) — pas heldNotes qui peut contenir
        // des notes de l'accord précédent pas encore effacées
        const src = (this.hold && this.holdMode === 'overwrite') ? this.activeNotes
                  : this.hold ? this.heldNotes
                  : this.activeNotes;

        const snapshot = [...src];
        if (!snapshot.length) {
          this.waitingForChord = false;
          this._chordTimer = null;
          return;
        }

        const wasEmpty = this.chordSnapshot.length === 0;
        // En accumulate+hold on prend toujours heldNotes complet comme snapshot
        // (il grandit à chaque note-on via syncHoldNotes)
        // En overwrite ou sans hold, on prend le snapshot calculé ci-dessus
        if (this.hold && this.holdMode === 'accumulate') {
          this.chordSnapshot = [...this.heldNotes];
        } else {
          this.chordSnapshot = snapshot;
        }
        if (wasEmpty) this.arp.stepIndex = 0;

        this.waitingForChord = false;
        this._chordTimer = null;
      }, this.CHORD_WAIT);
    },

    toggleMidiSync() {
      this.midiSync = !this.midiSync;
      if (!this.midiSync) {
        // Retour en mode interne : repart sur le BPM du slider
        this._midiClockTimes = [];
        this.midiBpm = null;
        if (!this.scheduler.running && !this.freeClock) this.startClock();
      } else {
        // En attente du clock externe — on stoppe le clock interne
        this.stopClock();
        this._midiClockTimes = [];
      }
    },

    onMidiClockTick() {
      // MIDI clock = 24 ticks par noire (quarter note)
      const now = performance.now();
      this._midiClockTimes.push(now);

      // On garde une fenêtre glissante de midiPpqn ticks (= 1 noire)
      if (this._midiClockTimes.length > this.midiPpqn) {
        this._midiClockTimes.shift();
      }

      // Calcul BPM dès qu'on a assez de ticks
      if (this._midiClockTimes.length >= Math.min(4, this.midiPpqn)) {
        const len = this._midiClockTimes.length;
        const elapsed = this._midiClockTimes[len - 1] - this._midiClockTimes[0];
        const tickInterval = elapsed / (len - 1);
        const beatInterval = tickInterval * this.midiPpqn;
        const bpm = Math.round(60000 / beatInterval);

        if (bpm !== this.arp.bpm) {
          this.arp.bpm = bpm;
          this.midiBpm = bpm;
          this.resyncClock();
        }
      }

      // Démarre le clock interne si pas encore lancé
      if (!this.scheduler.running) {
        this.resetClock();
        this.startClock();
      }
    },

    toggleFreeClock() {
      this.freeClock = !this.freeClock;
      if (this.freeClock) {
        // Passage en free : on stoppe si aucune note active
        const hasNotes = this.activeNotes.length > 0 || this.heldNotes.length > 0;
        if (!hasNotes) this.stopClock();
      } else {
        // Passage en non-free : le clock repart toujours
        if (!this.scheduler.running) this.startClock();
      }
    },

    updateClockGate() {
      const hasNotes = this.activeNotes.length > 0 || this.heldNotes.length > 0;

      if (this.freeClock) {
        if (hasNotes && !this.scheduler.running) {
          this.resetClock();
          this.startClock();
        }
        if (!hasNotes && this.scheduler.running) {
          this.stopClock();
        }
      }
      // non-free : le clock tourne toujours, rien à faire ici
    },

    resetClock() {
      this.arp.stepIndex = 0;
      this.scheduler.barStart   = performance.now();
      this.scheduler.startTime  = performance.now();
      this.scheduler.lastStepIndex = -1;
    },

    startClock() {
      if (this.scheduler.running) return;
      this.scheduler.running = true;
      this.scheduler.startTime = performance.now();
      this.scheduler.barStart  = performance.now();
      this.scheduler.lastStepIndex = -1;

      const tick = () => {
        if (!this.scheduler.running) return;

        const now = performance.now();
        const stepDur = this.stepDuration();
        const index = Math.floor((now - this.scheduler.startTime) / stepDur);

        // Mise à jour barStart
        const barDur = this.barDuration;
        while (now - this.scheduler.barStart >= barDur) {
          this.scheduler.barStart += barDur;
        }

        while (this.scheduler.lastStepIndex < index) {
          this.scheduler.lastStepIndex++;
          // Calcule le timestamp exact du step sur l'horloge performance
          const stepTime = this.scheduler.startTime + this.scheduler.lastStepIndex * stepDur;
          this.scheduleStep(stepTime);
        }

        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    },

    stopClock() {
      this.scheduler.running = false;
      this.arp.stepIndex = 0;
    },

    resyncClock() {
      if (!this.scheduler.running) return;
      const now = performance.now();
      const stepDur = this.stepDuration();
      const index = Math.floor((now - this.scheduler.startTime) / stepDur);
      this.scheduler.startTime = now - index * stepDur;
      this.scheduler.lastStepIndex = index - 1;
    },

    scheduleStep(stepTime) {
      if (!this.arpOn) return;
      // Pendant le buffer : on joue le snapshot précédent s'il existe,
      // sinon on attend silencieusement que l'accord soit validé
      let src;
      if (this.waitingForChord) {
        if (this.chordSnapshot.length) src = this.chordSnapshot;
        else return; // première frappe, pas encore de snapshot → silence bref
      } else {
        src = this.chordSnapshot.length ? this.chordSnapshot
            : (this.heldNotes.length ? this.heldNotes : this.activeNotes);
      }
      if (!src.length) return;

      const notes = this.pickNotes([...src]);
      if (!notes.length) return;

      // === QUANTIZATION SUR TIME SIGNATURE ===
      // On aligne la longueur du pattern sur un multiple de stepsPerBar,
      // puis on remplit les slots "extra" en rebouclant sur le pattern (pas de silence).
      const beats = this.beatsPerBar;
      const stpB  = this.stepsPerBeatDisplay;
      const stepsPerBarCount = beats * stpB;
      const rawLen = notes.length;
      // taille du cycle quantisé (multiple de stepsPerBar ≥ rawLen)
      const quantLen = Math.ceil(rawLen / stepsPerBarCount) * stepsPerBarCount;
      // index dans le cycle quantisé
      const idx = this.arp.stepIndex % quantLen;
      // on boucle toujours sur le pattern → jamais de silence
      const n = notes[idx % rawLen];

      const out = this.getOut();
      const dur = this.stepDuration();
      const audioDelayMs = Math.max(0, stepTime - performance.now());

      // chord : joue toutes les notes simultanément à chaque step
      if (this.arp.mode === "chord") {
        if (out) {
          for (const cn of src) {
            out.send([144, cn, 100]);
            setTimeout(() => out.send([128, cn, 0]), dur * 0.8);
          }
        }
        if (this.soundOn) {
          for (const cn of src) this.playTone(cn, dur * 0.8, audioDelayMs);
        }
      } else {
        if (out) {
          out.send([144, n, 100]);
          setTimeout(() => out.send([128, n, 0]), dur * 0.8);
        }
        if (this.soundOn) this.playTone(n, dur * 0.8, audioDelayMs);
      }

      this.arp.stepIndex++;
    },

    // Web Audio — init lazy au premier clic (autoplay policy)
    getAudioCtx() {
      if (!this._audioCtx) {
        this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Compresseur léger pour éviter la saturation sur les accords
        this._compressor = this._audioCtx.createDynamicsCompressor();
        this._compressor.connect(this._audioCtx.destination);
      }
      if (this._audioCtx.state === 'suspended') this._audioCtx.resume();
      return this._audioCtx;
    },

    playTone(midiNote, durationMs, delayMs = 0) {
      const ctx = this.getAudioCtx();
      const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
      // On schedule dans le futur AudioContext — le thread JS n'attend rien
      const start = ctx.currentTime + delayMs / 1000;
      const dur   = durationMs / 1000;

      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, start);

      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.18, start + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.001, start + dur);

      osc.connect(gain);
      gain.connect(this._compressor);

      // start/stop sont des appels non-bloquants — le moteur audio les exécute
      // dans son propre thread au bon moment
      osc.start(start);
      osc.stop(start + dur + 0.01);
    },

    stepDuration() {
      const beat = this.beatDuration;
      const map = {
        "1/4":1,    "1/8":0.5,    "1/16":0.25,    "1/32":0.125,    "1/64":0.0625,
        "1/4t":2/3, "1/8t":1/3,   "1/16t":1/6,    "1/32t":1/12,    "1/64t":1/24,
        "1/4.":1.5, "1/8.":0.75,  "1/16.":0.375,  "1/32.":0.1875,  "1/64.":0.09375
      };
      return beat * (map[this.arp.division] || 0.25);
    },

    applyOctaves(notes) {
      const oct = Math.max(1, this.arp.octaves || 1);
      const result = [];
      for (let i = 0; i < oct; i++) {
        const shift = i * 12;
        result.push(...notes.map(n => Math.min(127, n + shift)));
      }
      return result;
    },

    applyRepeat(notes) {
      const rep = Math.max(1, this.arp.repeat || 1);
      // Intercale chaque note rep fois : C E G → C C E E G G (repeat 2)
      const out = [];
      for (const n of notes) {
        for (let i = 0; i < rep; i++) out.push(n);
      }
      return out;
    },

    pickNotes(notes) {
      if (!notes.length) return [];

      if (this.arp.mode === "chord") {
        // chord est géré dans scheduleStep directement
        return notes;
      }

      let base;
      switch(this.arp.mode) {
        case "up":     base = [...notes].sort((a,b)=>a-b); break;
        case "down":   base = [...notes].sort((a,b)=>b-a); break;
        case "random": base = [...notes].sort(()=>Math.random()-0.5); break;
        case "order":  base = notes; break;
        case "updown": {
          const up   = [...notes].sort((a,b)=>a-b);
          const down = [...up].reverse().slice(1, -1);
          base = [...up, ...down];
          break;
        }
        default: base = notes;
      }

      base = this.applyOctaves(base);
      base = this.applyRepeat(base);
      return base;
    }

  }
}).mount("#app");
</script>
</body>
</html>
